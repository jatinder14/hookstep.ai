# Deploy recognize API (backend/ — Node + ffmpeg + node-shazam) → Cloud Run service "recognize".
#
# Secrets: GCP_SA_JSON — same service-account JSON as Hookstep Cloud Run deploy (Cloud Run Admin,
# Artifact Registry write, Service Account User on the Cloud Run runtime SA if needed).
#
# Project/region: jr-consulting-co / us-central1 (edit env block to change).

name: Deploy recognize to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-recognize-cloudrun.yml"
  workflow_dispatch:

concurrency:
  group: deploy-recognize-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: jr-consulting-co
  REGION: us-central1
  SERVICE: recognize
  AR_REPOSITORY: cloud-run-source-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify backend
        run: |
          set -euo pipefail
          test -f backend/Dockerfile
          test -f backend/package-lock.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Enable required APIs (idempotent)
        run: |
          gcloud services enable run.googleapis.com artifactregistry.googleapis.com \
            --project="${PROJECT_ID}" --quiet

      - name: Ensure Artifact Registry repository
        run: |
          if gcloud artifacts repositories describe "${AR_REPOSITORY}" \
            --location="${REGION}" --project="${PROJECT_ID}" --quiet 2>/dev/null; then
            echo "Repository ${AR_REPOSITORY} already exists."
          else
            gcloud artifacts repositories create "${AR_REPOSITORY}" \
              --repository-format=docker \
              --location="${REGION}" \
              --project="${PROJECT_ID}" \
              --description="Cloud Run container images" --quiet
          fi

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        working-directory: backend
        run: |
          IMAGE_BASE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPOSITORY}/${SERVICE}"
          docker build -t "${IMAGE_BASE}:${GITHUB_SHA}" -t "${IMAGE_BASE}:latest" .
          docker push "${IMAGE_BASE}:${GITHUB_SHA}"
          docker push "${IMAGE_BASE}:latest"

      - name: Deploy Cloud Run
        run: |
          set -euo pipefail
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPOSITORY}/${SERVICE}:${GITHUB_SHA}"
          gcloud run deploy "${SERVICE}" \
            --image="${IMAGE}" \
            --region="${REGION}" \
            --platform=managed \
            --project="${PROJECT_ID}" \
            --port=8080 \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=120 \
            --allow-unauthenticated \
            --no-invoker-iam-check \
            --clear-env-vars \
            --quiet

      - name: Show service URL
        run: |
          echo "POST $(gcloud run services describe "${SERVICE}" --region="${REGION}" --project="${PROJECT_ID}" --format='value(status.url)')/api/recognize"
